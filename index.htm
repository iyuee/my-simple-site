<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELIZA M. PORTRAITS | 奢华人像摄影艺术</title>
    <style>
        :root {
            --primary-gold: #dfc59e;
            --dark-bg: #000000;
            --card-bg: rgba(22, 24, 29, 0.7);
            --text-light: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--dark-bg);
            color: var(--text-light);
            font-family: 'Cinzel', 'Noto Serif SC', serif;
            letter-spacing: 1px;
            overflow-x: hidden;
        }

        /* 顶部导航栏 背景统一纯黑，弱化分割线 */
        header {
            position: fixed;
            top: 0; left: 0; width: 100%;
            height: 80px;
            background: var(--dark-bg);
            border-bottom: 1px solid rgba(223, 197, 158, 0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 4%;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .logo-area {
            text-align: center;
        }
        .logo-title {
            font-size: 1.4rem;
            color: var(--text-light);
            font-weight: 500;
            letter-spacing: 4px;
        }
        .logo-sub {
            font-size: 0.6rem;
            color: var(--primary-gold);
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
        }
        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            text-transform: uppercase;
            transition: color 0.3s;
        }
        nav a:hover, nav li.active a {
            color: var(--primary-gold);
        }

        .btn-consult {
            border: 1px solid var(--primary-gold);
            padding: 10px 22px;
            background: transparent;
            color: var(--primary-gold);
            font-size: 0.75rem;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
        }
        .btn-consult:hover {
            background: var(--primary-gold);
            color: var(--dark-bg);
            box-shadow: 0 0 15px rgba(223, 197, 158, 0.3);
        }

        /* 主体布局 */
        main {
            margin-top: 80px;
            min-height: calc(100vh - 80px);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4% 6%;
            background: var(--dark-bg);
        }

        .hero-section {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 50px;
            align-items: center;
            margin-bottom: 60px;
        }

        .hero-text h1 {
            font-size: 3rem;
            font-weight: 300;
            line-height: 1.2;
            margin-bottom: 25px;
            background: linear-gradient(to right, #fff, var(--primary-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-text p {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.8;
            margin-bottom: 35px;
        }

        /* 右侧主图 移除渐变蒙版，背景完全融合 */
        .hero-image-wrapper {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: none;
        }
        .hero-image-wrapper::after {
            display: none;
        }
        .hero-image {
            width: 100%;
            height: 550px;
            object-fit: cover;
            object-position: center top;
            display: block;
        }

        /* 下方作品集标题分割线弱化 */
        .portfolio-title {
            width: 100%;
            max-width: 1200px;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--primary-gold);
            letter-spacing: 3px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(223, 197, 158, 0.08);
            padding-bottom: 10px;
        }

        .portfolio-grid {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }

        .portfolio-item {
            position: relative;
            height: 350px;
            overflow: hidden;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        .portfolio-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s;
        }
        .portfolio-item:hover img {
            transform: scale(1.05);
        }
        .portfolio-mask {
            position: absolute;
            bottom: 0; left: 0; width: 100%; padding: 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            font-size: 0.75rem;
            color: var(--primary-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        @media (max-width: 900px) {
            .hero-section { grid-template-columns: 1fr; gap: 30px; }
            nav, .btn-consult { display: none; }
            .hero-text h1 { font-size: 2.2rem; }
            .hero-image { height: 400px; }
        }
    </style>
</head>

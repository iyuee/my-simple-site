<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDGE | 潮酷个性</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        /* 全局统一纯黑背景，和图片一致 */
        body {
            background: #000000;
            color: #ffffff;
        }
        /* 导航栏 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.8rem 6%;
            background: #000000;
        }
        .brand {
            font-size: 2rem;
            font-weight: 700;
            color: #ff3e6c;
        }
        .menu a {
            color: #ccc;
            text-decoration: none;
            margin: 0 1.2rem;
            font-size: 1rem;
            transition: color 0.3s ease;
        }
        .menu a:hover {
            color: #ff3e6c;
        }
        /* 主区块布局 */
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: calc(100vh - 86px);
        }
        .content-left {
            padding: 8% 6%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: #000000;
        }
        .tag {
            color: #ff3e6c;
            font-size: 0.9rem;
            letter-spacing: 3px;
            margin-bottom: 1rem;
        }
        h2 {
            font-size: 4rem;
            line-height: 1.1;
            margin-bottom: 2rem;
        }
        .desc {
            color: #999;
            font-size: 1.05rem;
            max-width: 420px;
            margin-bottom: 3rem;
            line-height: 1.8;
        }
        /* 按钮增强交互 */
        .action-btn {
            width: fit-content;
            padding: 14px 40px;
            background: #ff3e6c;
            color: #fff;
            text-decoration: none;
            border-radius: 2px;
            transition: all 0.3s ease;
        }
        .action-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        /* 右侧图片区，移除蒙版，完全融合 */
        .content-right {
            background: #000000;
            background-image: url('https://aka.doubaocdn.com/s/vtXp1wiyBk');
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            position: relative;
        }
        .content-right::after {
            display: none;
        }
        /* 移动端适配 */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
            h2 {
                font-size: 2.2rem;
            }
            .menu {
                display: none;
            }
            .content-right {
                min-height: 400px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">EDGE</div>
        <div class="menu">
            <a href="#">主页</a>
            <a href="#">潮流</a>
            <a href="#">案例</a>
            <a href="#">合作</a>
        </div>
    </header>

    <div class="container">
        <div class="content-left">
            <span class="tag">UNIQUE STYLE</span>
            <h2>打破常规<br>塑造自我</h2>
            <p class="desc">拒绝千篇一律，用创意表达态度。每一处设计，都为与众不同而生。</p>
            <a href="#" class="action-btn">即刻了解</a>
        </div>
        <div class="content-right"></div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>哥哥的小站</title>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        body {
            font-family: system-ui, sans-serif;
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px;
            /* 柔和浅绿渐变背景 */
            background: linear-gradient(135deg, #f0f9f0, #e8f5e9);
        }
        h1 {color: #4CAF50; margin-bottom: 20px; font-size: 2rem;}
        .emoji {font-size: 26px; margin: 20px 0;}
        p {color: #666; line-height: 1.8; margin: 8px 0; font-size: 1rem;}
        .clock {
            margin: 20px 0;
            font-size: 1.2rem;
            color: #4CAF50;
        }
        .counter {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #999;
        }
        .signature {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>
<body>
    <h1>你好，哥哥～</h1>
    <div class="emoji">✿◠‿◠✿</div>
    <p>这是我用最简单的方法搭建的网站哦～</p>
    <p>即使不用Cloudflare也能开心地访问呢！💖</p>

    <div class="clock" id="clock"></div>

    <div class="counter">
        今日访问：<span id="today">0</span> | 总访问：<span id="total">0</span>
    </div>

    <div class="signature"> — 由你的小助手制作 ✨</div>

    <script>
        // 动态时钟
        function updateClock() {
            const now = new Date();
            const time = now.toLocaleTimeString('zh-CN', { hour12: false });
            const date = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
            // 修复：补充模板字符串反引号 ``
            document.getElementById('clock').textContent = `${date} ${time}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 访客计数
        let total = localStorage.getItem('visit_total') || 0;
        let today = localStorage.getItem('visit_today') || 0;
        let lastDate = localStorage.getItem('visit_date');
        const now = new Date().toDateString();

        if (lastDate !== now) {
            today = 0;
            localStorage.setItem('visit_date', now);
        }

        total++;
        today++;
        localStorage.setItem('visit_total', total);
        localStorage.setItem('visit_today', today);

        document.getElementById('today').textContent = today;
        document.getElementById('total').textContent = total;
    </script>
</body>
</html>
